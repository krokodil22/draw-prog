<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Клавиатурный тренажёр</title>
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --text:#0f172a; --violet:#7c3aed; --border:#e2e8f0; --pink:#ec4899; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); }
      .wrap { width:min(980px,100%); margin:0 auto; padding:16px; }
      .stats { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
      .tag { background:#fff; border:1px solid var(--border); border-radius:12px; padding:6px 10px; font-weight:700; }
      .arena { position:relative; height:220px; border:1px solid var(--border); border-radius:16px; background:linear-gradient(90deg,#e2e8f0,#f8fafc); overflow:hidden; }
      .fly { position:absolute; left:0; top:50%; transform:translateY(-50%); font-weight:900; font-size:42px; background:var(--violet); color:#fff; padding:10px 18px; border-radius:14px; }
      .hint { position:absolute; inset:auto 0 16px; text-align:center; color:#475569; font-weight:700; }
      .kbd { margin-top:16px; display:flex; flex-direction:column; gap:8px; align-items:center; }
      .row { display:flex; gap:8px; }
      .key { min-width:40px; padding:9px 10px; border:1px solid var(--border); border-radius:10px; background:var(--panel); font-weight:700; }
      .key.active { background:var(--violet); color:#fff; }
      .key.wrong { background:#ef4444; color:#fff; }
      .space { min-width:220px; }
      .lives{display:flex;gap:6px}
      .heart{width:28px;height:28px;border:2px solid var(--pink);border-radius:50%;display:inline-block}
      .heart.full{background:var(--pink)}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="stats">
        <div class="lives" id="lives"></div>
        <div class="tag" id="score">Очки: 0</div>
      </div>
      <div class="arena" id="arena">
        <div class="fly" id="fly">Ф</div>
        <div class="hint" id="hint">Нажми ПРОБЕЛ, чтобы начать</div>
      </div>
      <div class="kbd" id="kbd"></div>
    </div>
    <script>
      const layout=[["Й","Ц","У","К","Е","Н","Г","Ш","Щ","З","Х"],["Ф","Ы","В","А","П","Р","О","Л","Д","Ж","Э"],["Я","Ч","С","М","И","Т","Ь","Б","Ю"]];
      const letters=["О","Е","А","И","Н","Т","С","Р","В","Л","К","М","Д","П","У","Я","Ы","Ь","Г","З","Б","Ч","Й","Х","Ж","Ш","Ю","Ц","Щ","Э","Ф"];
      const fly=document.getElementById('fly'), arena=document.getElementById('arena'), hint=document.getElementById('hint');
      const scoreEl=document.getElementById('score'), livesEl=document.getElementById('lives');
      const kbd=document.getElementById('kbd');
      let x=0, running=false, target='Ф', score=0, lives=4, lastTs=null;
      const keyMap=new Map();
      layout.forEach(r=>{const row=document.createElement('div');row.className='row';r.forEach(k=>{const b=document.createElement('button');b.className='key';b.textContent=k;row.appendChild(b);keyMap.set(k,b)});kbd.appendChild(row)});
      const sr=document.createElement('div');sr.className='row';const sb=document.createElement('button');sb.className='key space';sb.textContent='Пробел';sr.appendChild(sb);kbd.appendChild(sr);
      function renderLives(){livesEl.innerHTML='';for(let i=0;i<4;i++){const h=document.createElement('span');h.className='heart'+(i<lives?' full':'');livesEl.appendChild(h)}}
      function pick(){target=letters[Math.floor(Math.random()*letters.length)];fly.textContent=target;keyMap.forEach((b,l)=>b.classList.toggle('active',l===target));}
      function spawn(){x=arena.clientWidth-70;fly.style.left=x+'px';pick();}
      function reset(){running=false;score=0;lives=4;scoreEl.textContent='Очки: 0';renderLives();hint.textContent='Нажми ПРОБЕЛ, чтобы начать';spawn();}
      function lose(){lives--;renderLives();if(lives<=0){running=false;hint.textContent='Игра окончена! Нажми ПРОБЕЛ для новой попытки';}}
      function loop(ts){if(!running){requestAnimationFrame(loop);return;} if(lastTs==null)lastTs=ts; const dt=(ts-lastTs)/1000;lastTs=ts; x-=170*dt;fly.style.left=x+'px'; if(x<=8){lose();spawn();} requestAnimationFrame(loop)}
      function press(ch){ if(!running) return; const k=(ch||'').toLocaleUpperCase('ru'); if(k===target){score++;scoreEl.textContent='Очки: '+score;spawn();} else if(keyMap.has(k)){const b=keyMap.get(k);b.classList.add('wrong');setTimeout(()=>b.classList.remove('wrong'),180);lose();}}
      window.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault(); if(!running){running=true;hint.textContent='';lastTs=null;} else press(' ');} else press(e.key);});
      renderLives(); spawn(); requestAnimationFrame(loop);
    </script>
  </body>
</html>
