<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Клавиатурный тренажёр</title>
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --text:#0f172a; --violet:#7c3aed; --border:#e2e8f0; --pink:#ec4899; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); }
      .wrap { width:min(980px,100%); margin:0 auto; padding:16px; }
      .stats { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
      .tag { background:#fff; border:1px solid var(--border); border-radius:12px; padding:6px 10px; font-weight:700; }
      .arena { position:relative; height:220px; border:1px solid var(--border); border-radius:16px; background:linear-gradient(90deg,#e2e8f0,#f8fafc); overflow:hidden; }
      .fly { position:absolute; left:0; top:50%; transform:translateY(-50%); font-weight:900; font-size:42px; background:var(--violet); color:#fff; padding:10px 18px; border-radius:14px; }
      .hint { position:absolute; inset:auto 0 16px; text-align:center; color:#475569; font-weight:700; }
      .kbd-outer { margin-top:16px; overflow:hidden; }
      .kbd { margin-top:16px; display:flex; flex-direction:column; gap:8px; align-items:center; transform-origin: top center; }
      .row { display:flex; gap:8px; }
      .key { min-width:40px; padding:9px 10px; border:1px solid var(--border); border-radius:10px; background:var(--panel); font-weight:700; }
      .key.active { background:var(--violet); color:#fff; }
      .key.wrong { background:#ef4444; color:#fff; }
      .spacekey { min-width:220px; }
      .lives{display:flex;gap:6px}
      .heart{width:20px;height:20px;border:2px solid var(--pink);border-radius:50%;display:inline-block}
      .heart.filled{background:var(--pink)}
      .overlay{display:none;position:absolute;inset:0;background:rgba(15,23,42,.55);align-items:center;justify-content:center;padding:16px}
      .overlay-card{background:#fff;border-radius:12px;padding:16px;max-width:320px;width:100%;text-align:center}
      .actions{display:flex;gap:8px;justify-content:center;margin-top:10px}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="stats">
        <div class="lives" id="lives"></div>
        <div class="tag" id="scoreTag">Очки: 0</div>
      </div>
      <div class="arena" id="arena">
        <div class="fly" id="fly">Ф</div>
        <div class="hint" id="arenaHint">Нажми ПРОБЕЛ, чтобы начать</div>
        <div class="overlay" id="over">
          <div class="overlay-card">
            <h3 id="overlayTitle">Игра окончена</h3>
            <p id="finalScore">Ваш счёт: 0</p>
            <div class="actions">
              <button id="retryBtn" type="button">Начать заново</button>
              <button id="nextBtn" type="button" style="display:none">Следующий уровень</button>
            </div>
          </div>
        </div>
      </div>

      <div class="kbd-outer"><div class="kbd" id="kbd"></div></div>
    </div>

<script>
(function(){
  const RU_LAYOUT = [
    ["Ё","Й","Ц","У","К","Е","Н","Г","Ш","Щ","З","Х","Ъ"],
    ["Ф","Ы","В","А","П","Р","О","Л","Д","Ж","Э"],
    ["Я","Ч","С","М","И","Т","Ь","Б","Ю", "."]
  ];
  const LETTER_ORDER = ["О","Е","А","И","Н","Т","С","Р","В","Л","К","М","Д","П","У","Я","Ы","Ь","Г","З","Б","Ч","Й","Х","Ж","Ш","Ю","Ц","Щ","Э","Ф","Ъ","Ё"];
  const LEVEL_SIZES = {1:12,2:16,3:20,4:24,5:27,6:30};
  const SPEED = {1:105,2:125,3:145,4:165,5:185,6:205,7:225};
  const START_LIVES=4, RIGHT_PAD=24, TARGET_SCORE=20;

  const fly=document.getElementById('fly');
  const arena=document.getElementById('arena');
  const livesEl=document.getElementById('lives');
  const scoreTag=document.getElementById('scoreTag');
  const overlay=document.getElementById('over');
  const overlayTitle=document.getElementById('overlayTitle');
  const finalScore=document.getElementById('finalScore');
  const retryBtn=document.getElementById('retryBtn');
  const nextBtn=document.getElementById('nextBtn');
  const arenaHint=document.getElementById('arenaHint');
  const kbd=document.getElementById('kbd');

  const keyButtons=new Map();
  RU_LAYOUT.forEach(row=>{ const rowEl=document.createElement('div'); rowEl.className='row';
    row.forEach(k=>{ const b=document.createElement('button'); b.className='key'; b.textContent=k;
      b.addEventListener('click',()=>handleInput(k)); rowEl.appendChild(b); keyButtons.set(k,b); });
    kbd.appendChild(rowEl);
  });
  const spaceRow=document.createElement('div'); spaceRow.className='row';
  const spaceBtn=document.createElement('button'); spaceBtn.className='key spacekey'; spaceBtn.textContent='Пробел'; spaceBtn.id='spaceKey';
  spaceBtn.addEventListener('click',()=>{ if(running) handleInput(' '); else start(); }); spaceRow.appendChild(spaceBtn); kbd.appendChild(spaceRow);

  function applyKbdScale(){ const outer=document.querySelector('.kbd-outer'); const inner=document.querySelector('.kbd');
    if(!outer||!inner) return; const available=outer.clientWidth; const base=920;
    const s=Math.min(1, Math.max(0.6, available/base)); inner.style.transform='scale('+s+')'; }
  window.addEventListener('resize', applyKbdScale); applyKbdScale();

  let level=1,setLetters=[],running=false,levelComplete=false;
  let x=0,lastTs=null,lives=START_LIVES,score=0,target='Ф',lastTarget='';

  function lettersForLevelNum(n){ const size = LEVEL_SIZES[n] || LEVEL_SIZES[6]; return LETTER_ORDER.slice(0, size); }
  function makeHeart(f){ const el=document.createElement('span'); el.className='heart'+(f?' filled':''); return el; }
  function renderLives(){ livesEl.innerHTML=''; for(let i=0;i<START_LIVES;i++) livesEl.appendChild(makeHeart(i<lives)); }
  function up(s){ return (s||'').toLocaleUpperCase('ru'); }
  function highlight(){ keyButtons.forEach((b,l)=> b.classList.toggle('active', running && !levelComplete && l===target)); document.getElementById('spaceKey').classList.toggle('active', !running); }
  function randomNext(){ const pool = setLetters.length ? setLetters : LETTER_ORDER; let next = pool[Math.floor(Math.random()*pool.length)]; if(pool.length>1 && next===lastTarget){ next = pool[(pool.indexOf(next)+1)%pool.length]; } target=next; lastTarget=next; }
  function spawn(){ const w=arena.clientWidth||800; x=w-RIGHT_PAD; randomNext(); fly.textContent=target; fly.style.left=x+'px'; highlight(); }
  function setLevel(n){ level=n; setLetters=lettersForLevelNum(n); resetRound(); }
  function start(){ if(running||levelComplete) return; if(lives<=0){ lives=START_LIVES; score=0; updateScore(); } running=true; arenaHint.style.display='none'; overlay.style.display='none'; lastTs=null; highlight(); }
  function gameOver(){ running=false; overlay.style.display='flex'; overlayTitle.textContent='Игра окончена'; finalScore.textContent='Ваш счёт: '+score; retryBtn.style.display='inline-block'; nextBtn.style.display='none'; highlight(); }
  function updateScore(){ scoreTag.textContent='Очки: '+score; if(score>=TARGET_SCORE && !levelComplete){ levelComplete=true; running=false; overlay.style.display='flex'; overlayTitle.textContent='Уровень пройден!'; finalScore.textContent='Очки: '+score; retryBtn.style.display='none'; nextBtn.style.display= level<6 ? 'inline-block':'none'; } }
  function flashWrongKey(letter){ const btn=keyButtons.get(letter); if(!btn) return; btn.classList.add('wrong'); setTimeout(()=>btn.classList.remove('wrong'),220); }
  function loseLife(){ if(!running) return; lives-=1; renderLives(); if(lives<=0) gameOver(); }
  function handleInput(ch){ if(!running) return; const pressed=up(ch); if(pressed===target){ score+=1; updateScore(); spawn(); return; } if(keyButtons.has(pressed)){ flashWrongKey(pressed); loseLife(); } }
  function loop(ts){ if(lastTs==null) lastTs=ts; const dt=(ts-lastTs)/1000; lastTs=ts; if(running){ x-=(SPEED[level]||120)*dt; fly.style.left=x+'px'; if(x<=8){ loseLife(); spawn(); } } requestAnimationFrame(loop); }
  function resetRound(){ lives=START_LIVES; score=0; levelComplete=false; running=false; renderLives(); updateScore(); arenaHint.style.display='block'; spawn(); highlight(); }

  window.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); if(running) handleInput(' '); else start(); } else handleInput(e.key); });
  retryBtn.addEventListener('click', ()=>{ overlay.style.display='none'; resetRound(); });
  nextBtn.addEventListener('click', ()=>{ if(level<6) setLevel(level+1); overlay.style.display='none'; });

  setLevel(1);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
